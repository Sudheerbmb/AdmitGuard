<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdmitGuard — Administrative Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Space+Mono:wght@700&display=swap"
    rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #0b0c10;
      --accent: #00f2ff;
      --text: #e8eaf0;
      --surface: rgba(255, 255, 255, 0.03);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(255, 75, 110, 0.05) 0%, transparent 40%);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .login-card {
      width: 400px;
      padding: 48px;
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      animation: floatIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes floatIn {
      from {
        transform: translateY(40px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .logo-icon {
      width: 50px;
      height: 50px;
      background: var(--accent);
      border-radius: 12px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .auth-btn-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .security-footer {
      font-size: 11px;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .error-msg {
      color: #ff4b6e;
      font-size: 12px;
      margin-top: 16px;
      display: none;
      background: rgba(255, 75, 110, 0.1);
      padding: 8px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <div class="logo-icon">AG</div>
    <h1>Admin Command</h1>
    <p>Secure admission pipeline management. Please authorize into your administrator workspace.</p>

    <div class="auth-btn-wrap">
      <!-- Google Identity Services Button -->
      <div id="g_id_onload" data-client_id="436650604205-ifoim7stupnfpp80u5ha2u2f6nouts5v.apps.googleusercontent.com"
        data-context="signin" data-ux_mode="popup" data-callback="onSignIn" data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="signin_with"
        data-size="large" data-logo_alignment="left">
      </div>
    </div>

    <div class="security-footer">
      🛡️ Encrypted Session Key Protocol
    </div>
    <div id="errorBox" class="error-msg"></div>
  </div>

  <script>
    // Simple check for whitelist (Simulated for Demo)
    function onSignIn(response) {
      const responsePayload = decodeJwt(response.credential);
      const whitelist = ['sudheermsdvk@gmail.com', 'admin@admitguard.com'];

      if (whitelist.length === 0 || whitelist.includes(responsePayload.email)) {
        // Critical: Store the raw credential (THE TOKEN) to send to backend
        sessionStorage.setItem('admitguard_auth_token', response.credential);
        sessionStorage.setItem('admitguard_admin_user', JSON.stringify(responsePayload));
        window.location.href = 'admin.html';
      } else {
        const errorBox = document.getElementById('errorBox');
        errorBox.style.display = 'block';
        errorBox.textContent = "Access Denied: Unrecognized administrator email.";
      }
    }

    function decodeJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(atob(base64).split('').map(function (c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }
  </script>

</body>

</html>
